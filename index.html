<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #222;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            border: 2px solid #333;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const player = {
        x: canvas.width / 2 - 15,
        y: canvas.height - 40,
        width: 30,
        height: 30,
        speed: 5,
        dx: 0
    };

    const bullets = [];
    const enemies = [];
    let score = 0;
    let isGameOver = false;

    // Управление
    document.addEventListener("keydown", (e) => {
        if (e.code === "ArrowLeft") player.dx = -player.speed;
        if (e.code === "ArrowRight") player.dx = player.speed;
        if (e.code === "Space") shoot();
    });

    document.addEventListener("keyup", (e) => {
        if (e.code === "ArrowLeft" || e.code === "ArrowRight") player.dx = 0;
    });

    function shoot() {
        if (isGameOver) return;
        bullets.push({
            x: player.x + player.width / 2 - 2.5,
            y: player.y,
            width: 5,
            height: 10,
            speed: 7
        });
    }

    function spawnEnemy() {
        const size = Math.random() * 20 + 20;
        const x = Math.random() * (canvas.width - size);
        enemies.push({
            x: x,
            y: -size,
            width: size,
            height: size,
            speed: Math.random() * 2 + 1
        });
    }

    function update() {
        if (isGameOver) return;

        // Движение игрока
        player.x += player.dx;
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        // Движение пуль
        for (let i = 0; i < bullets.length; i++) {
            bullets[i].y -= bullets[i].speed;
            if (bullets[i].y < 0) {
                bullets.splice(i, 1);
                i--;
            }
        }

        // Движение врагов и столкновения
        for (let i = 0; i < enemies.length; i++) {
            enemies[i].y += enemies[i].speed;

            // Столкновение с игроком (конец игры)
            if (
                player.x < enemies[i].x + enemies[i].width &&
                player.x + player.width > enemies[i].x &&
                player.y < enemies[i].y + enemies[i].height &&
                player.y + player.height > enemies[i].y
            ) {
                isGameOver = true;
            }

            // Выход врага за экран
            if (enemies[i].y > canvas.height) {
                enemies.splice(i, 1);
                i--;
                continue;
            }

            // Столкновение пули и врага
            for (let j = 0; j < bullets.length; j++) {
                if (
                    bullets[j].x < enemies[i].x + enemies[i].width &&
                    bullets[j].x + bullets[j].width > enemies[i].x &&
                    bullets[j].y < enemies[i].y + enemies[i].height &&
                    bullets[j].y + bullets[j].height > enemies[i].y
                ) {
                    enemies.splice(i, 1);
                    bullets.splice(j, 1);
                    score += 10;
                    i--;
                    break;
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Игрок
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Пули
        ctx.fillStyle = "#ffff00";
        for (let bullet of bullets) {
            ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        }

        // Враги
        ctx.fillStyle = "#ff0000";
        for (let enemy of enemies) {
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        }

        // Счёт
        ctx.fillStyle = "#fff";
        ctx.font = "20px Arial";
        ctx.fillText(`Счёт: ${score}`, 10, 30);

        // Конец игры
        if (isGameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width / 2, canvas.height / 2);
            ctx.font = "20px Arial";
            ctx.fillText(`Ваш счёт: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    setInterval(spawnEnemy, 1000);
    loop();
</script>

</body>
</html>
