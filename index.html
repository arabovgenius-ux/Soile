<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SpeakUp Kids 🌟</title>
<img src="IMG_3312.jpeg" alt="Товар" style="width: 100%; max-width: 400px; border-radius: 8px;">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #e8f5e9;
      --bg2: #f1f8e9;
      --green: #43a047;
      --green-light: #66bb6a;
      --green-dark: #2e7d32;
      --junior: #ffb300;
      --junior-light: #ffd54f;
      --junior-dark: #e65100;
      --pro: #1e88e5;
      --pro-light: #64b5f6;
      --pro-dark: #0d47a1;
      --success: #00c853;
      --error: #ff5252;
      --white: #ffffff;
      --text: #1b5e20;
      --text-soft: #558b2f;
      --shadow: 0 8px 32px rgba(67,160,71,0.18);
      --radius: 24px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Floating background blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 260px; height: 260px; background: #a5d6a7; top: -60px; left: -80px; }
    .blob-2 { width: 200px; height: 200px; background: #c8e6c9; bottom: 40px; right: -60px; }
    .blob-3 { width: 140px; height: 140px; background: #ffe082; top: 40%; left: 60%; }

    /* ── Screens ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      padding: 0 0 40px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.45s cubic-bezier(.22,1,.36,1) both;
    }
    .screen.active { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Home header ── */
    .home-header {
      width: 100%;
      text-align: center;
      padding: 52px 24px 24px;
    }
    .logo-emoji {
      font-size: 64px;
      display: block;
      margin-bottom: 8px;
      animation: bounce 2.2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .app-title {
      font-family: 'Baloo 2', cursive;
      font-size: 36px;
      font-weight: 800;
      color: var(--green-dark);
      letter-spacing: -1px;
      line-height: 1;
    }
    .app-subtitle {
      font-size: 15px;
      color: var(--text-soft);
      font-weight: 600;
      margin-top: 6px;
    }

    /* ── Mode cards ── */
    .modes {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      padding: 12px 24px 0;
    }

    .mode-card {
      width: 100%;
      border: none;
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s cubic-bezier(.22,1,.36,1), box-shadow 0.18s;
      -webkit-user-select: none;
    }
    .mode-card:active { transform: scale(0.97); }

    .mode-card.junior {
      background: linear-gradient(135deg, #fff8e1 0%, #ffe082 60%, #ffb300 100%);
      box-shadow: 0 8px 30px rgba(255,179,0,0.35);
    }
    .mode-card.pro {
      background: linear-gradient(135deg, #e3f2fd 0%, #90caf9 60%, #1e88e5 100%);
      box-shadow: 0 8px 30px rgba(30,136,229,0.30);
    }

    .mode-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      opacity: 0.18;
    }
    .mode-card.junior::before { background: #fff; }
    .mode-card.pro::before    { background: #fff; }

    .mode-icon {
      font-size: 52px;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
    }
    .mode-info { flex: 1; }
    .mode-title {
      font-family: 'Baloo 2', cursive;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }
    .mode-card.junior .mode-title { color: #5d4037; }
    .mode-card.pro    .mode-title { color: #0d47a1; }

    .mode-desc {
      font-size: 13px;
      font-weight: 700;
      margin-top: 4px;
      opacity: 0.75;
    }
    .mode-card.junior .mode-desc { color: #6d4c41; }
    .mode-card.pro    .mode-desc { color: #1a237e; }

    .mode-arrow {
      font-size: 22px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    /* ── Tips at bottom ── */
    .tips {
      width: 100%;
      padding: 28px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .tip {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(67,160,71,0.10);
    }
    .tip-icon { font-size: 22px; }
    .tip-text { font-size: 13px; font-weight: 700; color: var(--text-soft); }

    /* ── Practice screen ── */
    .practice-header {
      width: 100%;
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      background: var(--white);
      border: none;
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(67,160,71,0.15);
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .back-btn:active { transform: scale(0.92); }

    .practice-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .practice-badge.junior { background: #fff3cd; color: #b45309; }
    .practice-badge.pro    { background: #dbeafe; color: #1d4ed8; }

    /* Word card */
    .word-card {
      margin: 32px 24px 0;
      width: calc(100% - 48px);
      background: var(--white);
      border-radius: var(--radius);
      padding: 40px 28px 36px;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .word-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .word-card.junior::after { background: linear-gradient(90deg, #ffb300, #ff6f00); }
    .word-card.pro::after    { background: linear-gradient(90deg, #1e88e5, #0d47a1); }

    .word-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9e9e9e;
      margin-bottom: 16px;
    }
    .word-text {
      font-family: 'Baloo 2', cursive;
      font-size: 48px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      margin-bottom: 10px;
    }
    .word-translation {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 28px;
    }

    /* Play button */
    .play-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
    }
    .play-btn.junior {
      background: linear-gradient(135deg, #ffb300, #ff6f00);
      box-shadow: 0 6px 20px rgba(255,111,0,0.40);
    }
    .play-btn.pro {
      background: linear-gradient(135deg, #1e88e5, #0d47a1);
      box-shadow: 0 6px 20px rgba(30,136,229,0.40);
    }
    .play-btn:active { transform: scale(0.93); }
    .play-btn.playing { animation: pulse 0.7s ease-in-out infinite alternate; }
    @keyframes pulse {
      from { transform: scale(1);    box-shadow: 0 6px 20px rgba(30,136,229,0.40); }
      to   { transform: scale(1.08); box-shadow: 0 10px 30px rgba(30,136,229,0.55); }
    }
    .play-label {
      font-size: 12px;
      font-weight: 800;
      color: #9e9e9e;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    /* Record button */
    .record-area {
      margin: 24px 24px 0;
      width: calc(100% - 48px);
    }
    .record-btn {
      width: 100%;
      padding: 22px;
      border: 3px dashed #a5d6a7;
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s, transform 0.18s;
      -webkit-user-select: none;
    }
    .record-btn:active { transform: scale(0.98); }
    .record-btn.recording {
      border-color: #ef5350;
      background: #fff5f5;
      animation: recordPulse 1s ease-in-out infinite;
    }
    @keyframes recordPulse {
      0%, 100% { border-color: #ef5350; background: #fff5f5; }
      50%       { border-color: #ff8a80; background: #ffebee; }
    }
    .record-icon {
      font-size: 38px;
      line-height: 1;
    }
    .record-text {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }
    .record-hint {
      font-size: 12px;
      font-weight: 700;
      color: #9e9e9e;
    }

    /* Waveform */
    .waveform {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 32px;
    }
    .waveform.active { display: flex; }
    .wave-bar {
      width: 5px;
      border-radius: 3px;
      background: #ef5350;
      animation: wave 0.8s ease-in-out infinite;
    }
    .wave-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .wave-bar:nth-child(2) { height: 22px; animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { height: 32px; animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { height: 18px; animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { height: 28px; animation-delay: 0.4s; }
    .wave-bar:nth-child(6) { height: 14px; animation-delay: 0.5s; }
    .wave-bar:nth-child(7) { height: 24px; animation-delay: 0.15s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.5); }
      50%       { transform: scaleY(1.2); }
    }

    /* Result box */
    .result-box {
      margin: 18px 24px 0;
      width: calc(100% - 48px);
      border-radius: var(--radius-sm);
      padding: 18px 20px;
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      display: none;
      animation: popIn 0.35s cubic-bezier(.22,1,.36,1) both;
    }
    .result-box.show { display: block; }
    .result-box.correct {
      background: #e8f5e9;
      color: #1b5e20;
      border: 2px solid #a5d6a7;
    }
    .result-box.wrong {
      background: #ffebee;
      color: #b71c1c;
      border: 2px solid #ef9a9a;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Transcript */
    .transcript-box {
      margin: 8px 24px 0;
      width: calc(100% - 48px);
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: none;
    }
    .transcript-box.show { display: block; }
    .transcript-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9e9e9e;
      margin-bottom: 4px;
    }
    .transcript-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    /* Not supported */
    .not-supported {
      margin: 18px 24px 0;
      width: calc(100% - 48px);
      background: #fff3e0;
      border: 2px solid #ffe0b2;
      border-radius: var(--radius-sm);
      padding: 16px;
      font-size: 13px;
      font-weight: 700;
      color: #e65100;
      text-align: center;
      display: none;
    }

    /* Progress stars */
    .stars-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 20px 0 0;
      font-size: 24px;
    }
    .star { opacity: 0.25; transition: opacity 0.3s, transform 0.3s; }
    .star.lit { opacity: 1; transform: scale(1.2); }

    /* ─ Responsive tweaks ─ */
    @media (max-width: 360px) {
      .word-text { font-size: 38px; }
      .mode-icon { font-size: 42px; }
      .mode-title { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- Decorative blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ══════════ HOME SCREEN ══════════ -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <span class="logo-emoji">🦜</span>
    <div class="app-title">SpeakUp Kids</div>
    <div class="app-subtitle">Учи английский — говори вслух!</div>
  </div>

  <div class="modes">
    <button class="mode-card junior" onclick="openMode('junior')">
      <span class="mode-icon">🐣</span>
      <div class="mode-info">
        <div class="mode-title">Junior</div>
        <div class="mode-desc">5–8 лет · Простые слова</div>
      </div>
      <span class="mode-arrow">›</span>
    </button>

    <button class="mode-card pro" onclick="openMode('pro')">
      <span class="mode-icon">🚀</span>
      <div class="mode-info">
        <div class="mode-title">Pro</div>
        <div class="mode-desc">9–13 лет · Фразы и диалоги</div>
      </div>
      <span class="mode-arrow">›</span>
    </button>
  </div>

  <div class="tips">
    <div class="tip">
      <span class="tip-icon">🔊</span>
      <span class="tip-text">Нажми кнопку и послушай, как звучит слово</span>
    </div>
    <div class="tip">
      <span class="tip-icon">🎤</span>
      <span class="tip-text">Повтори вслух и получи оценку!</span>
    </div>
  </div>
</div>

<!-- ══════════ PRACTICE SCREEN ══════════ -->
<div class="screen" id="screen-practice">
  <div class="practice-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <span class="practice-badge" id="practice-badge">🐣 Junior</span>
  </div>

  <div class="word-card" id="word-card">
    <div class="word-label">Слово</div>
    <div class="word-text" id="word-text">Apple</div>
    <div class="word-translation" id="word-translation">🍎 Яблоко</div>

    <button class="play-btn" id="play-btn" onclick="playWord()">🔊</button>
    <div class="play-label">Послушать</div>

    <div class="stars-row" id="stars-row">
      <span class="star" id="s1">⭐</span>
      <span class="star" id="s2">⭐</span>
      <span class="star" id="s3">⭐</span>
    </div>
  </div>

  <div class="record-area">
    <button class="record-btn" id="record-btn" onclick="toggleRecord()">
      <span class="record-icon" id="record-icon">🎤</span>
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div class="record-text" id="record-text">Нажми и говори</div>
      <div class="record-hint" id="record-hint">Удержи и произнеси слово</div>
    </button>
  </div>

  <div class="result-box" id="result-box"></div>

  <div class="transcript-box" id="transcript-box">
    <div class="transcript-label">Распознано</div>
    <div class="transcript-text" id="transcript-text"></div>
  </div>

  <div class="not-supported" id="not-supported">
    ⚠️ Распознавание речи недоступно в этом браузере. Попробуй Chrome или Safari.
  </div>
</div>

<script>
  /* ─── Telegram Web App init ─── */
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  }

  /* ─── State ─── */
  let currentMode = null;
  let recognition = null;
  let isRecording = false;
  let successCount = 0;

  const MODES = {
    junior: {
      word: 'Apple',
      phrase: 'apple',
      translation: '🍎 Яблоко',
      badge: '🐣 Junior',
      badgeClass: 'junior',
      ttsText: 'Apple',
      color: 'junior'
    },
    pro: {
      word: "What's up, bro?",
      phrase: "what's up bro",
      translation: '😎 Что как, братан?',
      badge: '🚀 Pro',
      badgeClass: 'pro',
      ttsText: "What's up, bro?",
      color: 'pro'
    }
  };

  /* ─── Screen navigation ─── */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function openMode(mode) {
    currentMode = mode;
    const cfg = MODES[mode];
    successCount = 0;

    // Update UI
    document.getElementById('practice-badge').textContent = cfg.badge;
    document.getElementById('practice-badge').className = 'practice-badge ' + cfg.badgeClass;
    document.getElementById('word-card').className = 'word-card ' + cfg.color;
    document.getElementById('play-btn').className = 'play-btn ' + cfg.color;
    document.getElementById('word-text').textContent = cfg.word;
    document.getElementById('word-translation').textContent = cfg.translation;

    // Reset stars
    ['s1','s2','s3'].forEach(id => document.getElementById(id).classList.remove('lit'));

    // Reset result
    resetResult();

    // Check speech support
    const supported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
    document.getElementById('not-supported').style.display = supported ? 'none' : 'block';
    document.getElementById('record-btn').style.display   = supported ? 'flex' : 'none';

    showScreen('screen-practice');
  }

  function goHome() {
    stopRecording();
    showScreen('screen-home');
  }

  /* ─── Text-to-Speech ─── */
  function playWord() {
    if (!currentMode) return;
    const cfg = MODES[currentMode];
    const btn = document.getElementById('play-btn');

    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(cfg.ttsText);
    utter.lang = 'en-US';
    utter.rate = 0.85;
    utter.pitch = currentMode === 'junior' ? 1.1 : 1.0;

    btn.classList.add('playing');
    utter.onend = () => btn.classList.remove('playing');
    utter.onerror = () => btn.classList.remove('playing');

    window.speechSynthesis.speak(utter);
  }

  /* ─── Speech Recognition ─── */
  function initRecognition() {
    const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SRClass) return null;

    const rec = new SRClass();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 5;

    rec.onresult = (e) => {
      const transcripts = Array.from(e.results[0]).map(alt => alt.transcript.toLowerCase().trim());
      handleResult(transcripts);
    };

    rec.onerror = (e) => {
      stopRecording();
      if (e.error === 'no-speech') {
        showResult(false, '🔇 Ничего не слышно. Говори громче!');
      } else if (e.error === 'not-allowed') {
        showResult(false, '🎙️ Разреши доступ к микрофону!');
      } else {
        showResult(false, '😕 Ошибка. Попробуй ещё раз!');
      }
    };

    rec.onend = () => {
      if (isRecording) stopRecording();
    };

    return rec;
  }

  function toggleRecord() {
    if (isRecording) { stopRecording(); return; }
    startRecording();
  }

  function startRecording() {
    recognition = initRecognition();
    if (!recognition) return;

    resetResult();
    isRecording = true;

    const btn  = document.getElementById('record-btn');
    const icon = document.getElementById('record-icon');
    const wave = document.getElementById('waveform');
    const txt  = document.getElementById('record-text');
    const hint = document.getElementById('record-hint');

    btn.classList.add('recording');
    icon.style.display = 'none';
    wave.classList.add('active');
    txt.textContent  = 'Слушаю…';
    hint.textContent = 'Говори сейчас!';

    try { recognition.start(); } catch(e) { stopRecording(); }
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }

    const btn  = document.getElementById('record-btn');
    const icon = document.getElementById('record-icon');
    const wave = document.getElementById('waveform');
    const txt  = document.getElementById('record-text');
    const hint = document.getElementById('record-hint');

    btn.classList.remove('recording');
    icon.style.display = '';
    wave.classList.remove('active');
    txt.textContent  = 'Нажми и говори';
    hint.textContent = 'Удержи и произнеси слово';
  }

  function normalize(str) {
    return str.toLowerCase()
      .replace(/[^\w\s']/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function handleResult(transcripts) {
    stopRecording();
    if (!currentMode) return;

    const target = normalize(MODES[currentMode].phrase);
    const said   = transcripts.map(normalize);

    // Show best transcript
    document.getElementById('transcript-text').textContent = '«' + transcripts[0] + '»';
    document.getElementById('transcript-box').classList.add('show');

    // Check match: exact or contains key words
    const correct = said.some(t => {
      if (t === target) return true;
      if (t.includes(target)) return true;
      // For phrase mode, check if all main words present
      const targetWords = target.split(' ').filter(w => w.length > 2);
      return targetWords.every(w => t.includes(w));
    });

    if (correct) {
      successCount = Math.min(successCount + 1, 3);
      lightStars(successCount);
      showResult(true, 'Правильно! 🎉');
      playSuccessSound();
      // Haptic feedback for Telegram
      if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
      }
    } else {
      showResult(false, 'Попробуй ещё раз! 🔁');
      if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
      }
    }
  }

  function showResult(ok, msg) {
    const box = document.getElementById('result-box');
    box.textContent = msg;
    box.className   = 'result-box show ' + (ok ? 'correct' : 'wrong');
  }

  function resetResult() {
    const box = document.getElementById('result-box');
    box.className = 'result-box';
    box.textContent = '';
    document.getElementById('transcript-box').classList.remove('show');
    document.getElementById('transcript-text').textContent = '';
  }

  function lightStars(n) {
    ['s1','s2','s3'].forEach((id, i) => {
      const el = document.getElementById(id);
      if (i < n) { setTimeout(() => el.classList.add('lit'), i * 150); }
    });
  }

  /* ─── Success sound via AudioContext ─── */
  function playSuccessSound() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523, 659, 784]; // C5 E5 G5 — major chord arpeggio
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const start = ctx.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.18, start + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.45);
        osc.start(start);
        osc.stop(start + 0.45);
      });
    } catch(e) {}
  }
</script>
