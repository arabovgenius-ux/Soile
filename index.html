<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Элегантная карусель эмоций</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #13151a, #1c2128, #2d333b);
            font-family: 'Helvetica Neue', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .carousel-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 60px 80px;
            display: flex;
            align-items: center;
            gap: 50px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .emoji-display {
            font-size: 120px;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #d4af37; /* Элегантный золотой оттенок */
            color: #d4af37;
            font-size: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
            outline: none;
        }

        .nav-btn:hover {
            background: #d4af37;
            color: #13151a;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.1);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        /* Анимация переключения */
        .fade-out {
            opacity: 0;
            transform: scale(0.8);
        }
        .fade-in {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div class="carousel-container">
        <button id="prevBtn" class="nav-btn">&#10094;</button>
        <div class="emoji-display" id="emojiDisplay">😀</div>
        <button id="nextBtn" class="nav-btn">&#10095;</button>
    </div>

    <script>
        // 50 разных эмоций
        const emojis = [
            '😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '🥲', '☺️',
            '😊', '😇', '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘', '😗',
            '😙', '😚', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓',
            '😎', '🥸', '🤩', '🥳', '😏', '😒', '😞', '😔', '😟', '😕',
            '🙁', '☹️', '😣', '😖', '😫', '😩', '🥺', '😢', '😭', '😤'
        ];
        
        let currentIndex = 0;
        const display = document.getElementById('emojiDisplay');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function animateEmojiChange(newIndex) {
            display.style.opacity = '0';
            display.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                currentIndex = newIndex;
                display.textContent = emojis[currentIndex];
                display.style.opacity = '1';
                display.style.transform = 'scale(1)';
            }, 150);
        }

        prevBtn.addEventListener('click', () => {
            const newIndex = (currentIndex - 1 + emojis.length) % emojis.length;
            animateEmojiChange(newIndex);
        });

        nextBtn.addEventListener('click', () => {
            const newIndex = (currentIndex + 1) % emojis.length;
            animateEmojiChange(newIndex);
        });
    </script>

</body>
</html>
