<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÖILE Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8f5e9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { color: #2e7d32; }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border-radius: 15px;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-pro { background-color: #2196F3; }
        .btn-mic { background-color: #ff9800; font-size: 24px; border-radius: 50%; width: 80px; height: 80px; margin-top: 20px; }
        .btn-back { background-color: #9e9e9e; font-size: 14px; padding: 10px 20px; margin-top: 30px;}
        #lesson-screen { display: none; width: 100%; }
        .word-display { font-size: 32px; font-weight: bold; margin: 20px 0; color: #1565c0; }
        #result-msg { font-size: 18px; font-weight: bold; margin-top: 15px; min-height: 25px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>Выбери уровень!</h1>
        <button class="btn" onclick="startLesson('junior')">🐶 Junior (5-8 лет)</button>
        <button class="btn btn-pro" onclick="startLesson('pro')">🎮 Pro (9-13 лет)</button>
    </div>

    <div id="lesson-screen">
        <h2 id="level-title"></h2>
        <div class="word-display" id="target-word"></div>
        
        <button class="btn" onclick="playSound()">🔊 Послушать</button>
        <br>
        <button class="btn btn-mic" onclick="startMic()">🎤</button>
        <p>Нажми и говори!</p>

        <div id="result-msg"></div>

        <button class="btn btn-back" onclick="goBack()">⬅️ Назад</button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        let currentWord = "";

        function startLesson(level) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('lesson-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "";

            if (level === 'junior') {
                document.getElementById('level-title').innerText = "Урок 1: База";
                currentWord = "Apple";
            } else if (level === 'pro') {
                document.getElementById('level-title').innerText = "Урок 1: Сленг";
                currentWord = "What's up bro";
            }
            document.getElementById('target-word').innerText = currentWord;
        }

        function goBack() {
            document.getElementById('lesson-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
        }

        // Озвучка текста (Синтез речи)
        function playSound() {
            let utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'en-US';
            speechSynthesis.speak(utterance);
        }

        // Проверка произношения (Распознавание речи)
        function startMic() {
            const resultMsg = document.getElementById('result-msg');
            resultMsg.innerText = "Слушаю...";
            resultMsg.style.color = "black";

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                resultMsg.innerText = "Браузер не поддерживает микрофон 😢";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;

            recognition.start();

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript.toLowerCase().replace(/[^a-z ]/g, "").trim();
                const targetClean = currentWord.toLowerCase().replace(/[^a-z ]/g, "").trim();

                if (speechResult === targetClean) {
                    resultMsg.innerText = "Правильно! 🎉";
                    resultMsg.style.color = "green";
                } else {
                    resultMsg.innerText = `Услышал: "${speechResult}". Попробуй еще раз! 🔁`;
                    resultMsg.style.color = "red";
                }
            };

            recognition.onerror = () => {
                resultMsg.innerText = "Ошибка доступа к микрофону.";
                resultMsg.style.color = "red";
            };
        }
    </script>
</body>
</html>
